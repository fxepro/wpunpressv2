[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "http://wpunpress.com/*"
  to     = "https://wpunpress.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.wpunpress.com/*"
  to     = "https://wpunpress.com/:splat"
  status = 301
  force  = true
